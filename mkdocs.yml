site_name: OMATH Docs
theme:
  name: material
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
extra_css:
  - styles/center.css
  - styles/custom-header.css
  - styles/links.css
